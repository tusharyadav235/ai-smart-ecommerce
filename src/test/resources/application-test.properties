spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

cloudinary.cloud-name=dummy
cloudinary.api-key=dummy
cloudinary.api-secret=dummy

spring.redis.host=dummy
spring.redis.port=dummy
spring.redis.username=dummy
spring.redis.passworddummy



# Connection Properties
spring.ai.openai.base-url=dummy
spring.ai.openai.api-key=dummy

# Chat Configuration
spring.ai.openai.chat.options.model=dummy
spring.main.allow-bean-definition-overriding=dummy
jwt.secret=MySuperSecretKeyForJwtGeneration123456
jwt.expiration=86400000



