# -------------------------
# H2 In-Memory Database
# -------------------------
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Cloudinary (Mocks)
cloudinary.cloud-name=dummy
cloudinary.api-key=dummy
cloudinary.api-secret=dummy

# Redis (Mocks) - Fixed syntax here
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.username=dummy
spring.redis.password=dummy

# AI Config - Fixed boolean here
spring.ai.openai.base-url=https://api.openai.com
spring.ai.openai.api-key=dummy
spring.ai.openai.chat.options.model=gpt-3.5-turbo
spring.main.allow-bean-definition-overriding=true

# Security - Values Spring was complaining about
jwt.secret=MySuperSecretKeyForJwtGeneration123456
jwt.expiration=86400000